version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: oldshop_postgres
    environment:
      POSTGRES_DB: oldshop
      POSTGRES_USER: oldshop_user
      POSTGRES_PASSWORD: oldshop_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - oldshop_network

volumes:
  postgres_data:

networks:
  oldshop_network:
    driver: bridge