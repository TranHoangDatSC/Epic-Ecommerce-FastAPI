<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card">
        <div class="card-header">
          <h3 class="mb-0">Add New Product</h3>
        </div>
        <div class="card-body">
          <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
            <!-- Category -->
            <div class="mb-3">
              <label for="category_id" class="form-label">Category <span class="text-danger">*</span></label>
              <select
                id="category_id"
                class="form-select"
                formControlName="category_id"
                [class.is-invalid]="productForm.get('category_id')?.invalid && productForm.get('category_id')?.touched">
                <option value="">Select Category</option>
                <option *ngFor="let category of categories" [value]="category.id">
                  {{ category.name }}
                </option>
              </select>
              <div class="invalid-feedback" *ngIf="productForm.get('category_id')?.invalid && productForm.get('category_id')?.touched">
                Category is required.
              </div>
            </div>

            <!-- Title -->
            <div class="mb-3">
              <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
              <input
                type="text"
                id="title"
                class="form-control"
                formControlName="title"
                placeholder="Product title"
                [class.is-invalid]="productForm.get('title')?.invalid && productForm.get('title')?.touched">
              <div class="invalid-feedback" *ngIf="productForm.get('title')?.invalid && productForm.get('title')?.touched">
                Title is required and must be between 1-255 characters.
              </div>
            </div>

            <!-- Description -->
            <div class="mb-3">
              <label for="description" class="form-label">Description</label>
              <textarea
                id="description"
                class="form-control"
                formControlName="description"
                rows="3"
                placeholder="Product description"></textarea>
            </div>

            <!-- Price and Quantity -->
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="price" class="form-label">Price (VND) <span class="text-danger">*</span></label>
                <input
                  type="number"
                  id="price"
                  class="form-control"
                  formControlName="price"
                  min="0"
                  step="0.01"
                  [class.is-invalid]="productForm.get('price')?.invalid && productForm.get('price')?.touched">
                <div class="invalid-feedback" *ngIf="productForm.get('price')?.invalid && productForm.get('price')?.touched">
                  Price is required and must be greater than 0.
                </div>
              </div>
              <div class="col-md-6 mb-3">
                <label for="quantity" class="form-label">Quantity <span class="text-danger">*</span></label>
                <input
                  type="number"
                  id="quantity"
                  class="form-control"
                  formControlName="quantity"
                  min="0"
                  [class.is-invalid]="productForm.get('quantity')?.invalid && productForm.get('quantity')?.touched">
                <div class="invalid-feedback" *ngIf="productForm.get('quantity')?.invalid && productForm.get('quantity')?.touched">
                  Quantity is required and must be 0 or greater.
                </div>
              </div>
            </div>

            <!-- Optional fields -->
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="weight_grams" class="form-label">Weight (grams)</label>
                <input
                  type="number"
                  id="weight_grams"
                  class="form-control"
                  formControlName="weight_grams"
                  min="0">
              </div>
              <div class="col-md-6 mb-3">
                <label for="condition_rating" class="form-label">Condition Rating (1-10)</label>
                <input
                  type="number"
                  id="condition_rating"
                  class="form-control"
                  formControlName="condition_rating"
                  min="1"
                  max="10">
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="dimensions" class="form-label">Dimensions</label>
                <input
                  type="text"
                  id="dimensions"
                  class="form-control"
                  formControlName="dimensions"
                  placeholder="e.g., 10x20x5 cm">
              </div>
              <div class="col-md-6 mb-3">
                <label for="warranty_months" class="form-label">Warranty (months)</label>
                <input
                  type="number"
                  id="warranty_months"
                  class="form-control"
                  formControlName="warranty_months"
                  min="0">
              </div>
            </div>

            <!-- Video URL -->
            <div class="mb-3">
              <label for="video_url" class="form-label">Video URL</label>
              <input
                type="url"
                id="video_url"
                class="form-control"
                formControlName="video_url"
                placeholder="https://...">
            </div>

            <!-- Image Upload -->
            <div class="mb-3">
              <label for="images" class="form-label">Product Images <span class="text-danger">*</span></label>
              <input
                type="file"
                id="images"
                class="form-control"
                multiple
                accept="image/*"
                (change)="onFileSelected($event)">
              <div class="form-text">
                Select one or more images. At least one image is required.
              </div>

              <!-- Selected Files Preview -->
              <div class="mt-3" *ngIf="selectedFiles.length > 0">
                <h6>Selected Images:</h6>
                <div class="d-flex flex-wrap gap-2">
                  <div *ngFor="let file of selectedFiles; let i = index" class="position-relative">
                    <img
                      [src]="getFilePreviewUrl(file)"
                      class="img-thumbnail"
                      style="width: 100px; height: 100px; object-fit: cover;"
                      [alt]="file.name">
                    <button
                      type="button"
                      class="btn btn-sm btn-danger position-absolute top-0 end-0"
                      (click)="removeFile(i)">
                      ×
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Submit Button -->
            <div class="d-flex gap-2">
              <button
                type="submit"
                class="btn btn-primary"
                [disabled]="!isFormValid() || isSubmitting">
                <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2" role="status"></span>
                {{ isSubmitting ? 'Creating...' : 'Create Product' }}
              </button>
              <button type="button" class="btn btn-secondary" (click)="router.navigate(['/seller/inventory'])">
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
