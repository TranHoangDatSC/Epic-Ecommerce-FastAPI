<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Product Inventory</h2>
    <button class="btn btn-primary" routerLink="/seller/inventory/add">Add New Product</button>
  </div>
  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><img src="https://via.placeholder.com/50" class="img-thumbnail" alt="Product"></td>
              <td>Product A</td>
              <td>Electronics</td>
              <td>$99.99</td>
              <td>25</td>
              <td><span class="badge bg-success">Active</span></td>
              <td>
                <button class="btn btn-sm btn-outline-primary me-1">Edit</button>
                <button class="btn btn-sm btn-outline-danger">Delete</button>
              </td>
            </tr>
            <tr>
              <td><img src="https://via.placeholder.com/50" class="img-thumbnail" alt="Product"></td>
              <td>Product B</td>
              <td>Clothing</td>
              <td>$49.99</td>
              <td>0</td>
              <td><span class="badge bg-warning">Out of Stock</span></td>
              <td>
                <button class="btn btn-sm btn-outline-primary me-1">Edit</button>
                <button class="btn btn-sm btn-outline-danger">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
