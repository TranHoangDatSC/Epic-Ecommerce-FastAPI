<div class="seller-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-section">
        <i class="bi bi-shop"></i>
        <h3>Kênh Người Bán</h3>
      </div>
      <p class="subtitle">Quản lý bán hàng</p>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section" *ngFor="let section of navSections">
        <h4 class="section-title">
          <i [class]="section.icon"></i>
          {{ section.title }}
        </h4>
        <ul class="nav-list">
          <li class="nav-item" *ngFor="let item of section.items">
            <a [routerLink]="['/seller', item.path]" routerLinkActive="active" class="nav-link">
              <i [class]="item.icon"></i>
              <span>{{ item.label }}</span>
            </a>
          </li>
        </ul>
      </div>

      <!-- Home & Logout -->
      <div class="nav-section mt-auto mb-4">
        <ul class="nav-list d-flex flex-column align-items-center gap-3">
          <li class="nav-item action-item w-100 d-flex justify-content-center">
            <a routerLink="/" class="nav-link action-link home-link text-center">
              <i class="bi bi-house-door"></i>
              <span>Về Trang Chủ</span>
            </a>
          </li>
          <li class="nav-item action-item w-100 d-flex justify-content-center">
            <button class="nav-link action-link logout-link" (click)="logout()">
              <i class="bi bi-box-arrow-right"></i>
              <span>Đăng xuất</span>
            </button>
          </li>
        </ul>
      </div>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
