<div class="container mt-5" *ngIf="user; else loading">
  <div class="row">
    <div class="col-md-4">
      <div class="card shadow-sm border-0">
        <div class="card-body text-center py-4">
          <div class="avatar-wrapper position-relative d-inline-block">
            <img [src]="getAvatarUrl(userProfile.avatar_url)" 
                 (error)="onImageError($event)" 
                 class="rounded-circle border border-4 border-white shadow-lg" 
                 style="width: 160px; height: 160px; object-fit: cover;" 
                 alt="Avatar">
            <button class="btn btn-primary btn-sm rounded-circle position-absolute bottom-0 end-0 shadow-sm"
                    style="width: 40px; height: 40px; border: 3px solid #fff;"
                    (click)="triggerFileUpload()"
                    type="button"
                    title="Change Avatar">
              <i class="bi bi-camera-fill"></i>
            </button>
            <input type="file" id="avatarInput" hidden (change)="onFileSelected($event)" accept="image/*">
          </div>
          <h4 class="mt-3 fw-bold">{{ userProfile.full_name }}</h4>
          <span class="badge rounded-pill bg-primary bg-opacity-10 text-primary px-3 py-2">
            <i class="bi bi-person-badge me-1"></i>{{ userProfile.role }}
          </span>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3">
          <h5 class="mb-0 text-primary">Chi tiết tài khoản</h5>
        </div>
        <div class="card-body p-4">
          <form (ngSubmit)="saveChanges()">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label text-muted">Họ và tên</label>
                <input type="text" class="form-control" [(ngModel)]="userProfile.full_name" name="fullName">
              </div>
              <div class="col-md-6">
                <label class="form-label text-muted">Tên đăng nhập</label>
                <input type="text" class="form-control bg-light" [value]="userProfile.username" readonly>
              </div>
              <div class="col-12">
                <label class="form-label text-muted">Email</label>
                <input type="email" class="form-control" [(ngModel)]="userProfile.email" name="email">
              </div>
              <div class="col-md-6">
                <label class="form-label text-muted">Số điện thoại</label>
                <input type="text" class="form-control" [(ngModel)]="userProfile.phone_number" name="phone">
              </div>
              <div class="col-md-6">
                <label class="form-label text-muted">Điểm tin cậy</label>
                <input type="text" class="form-control bg-light" [value]="userProfile.trust_score || 0" readonly>
              </div>
              <div class="col-12">
                <label class="form-label text-muted">Địa chỉ</label>
                <textarea class="form-control" [(ngModel)]="userProfile.address" name="address" rows="2"></textarea>
              </div>
            </div>

            <div class="mt-4 text-end">
              <button type="submit" class="btn btn-primary px-4">Lưu thay đổi</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #loading>
  <div class="text-center mt-5">
    <div class="spinner-border text-primary"></div>
  </div>
</ng-template>
