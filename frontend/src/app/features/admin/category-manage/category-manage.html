<div class="admin-content-wrapper delay-animation">
  <!-- Header -->
  <header class="page-header">
    <div>
      <h2>Quản lý Danh mục</h2>
      <p>"Hệ thống phân loại sản phẩm của nền tảng."</p>
    </div>
    <div class="toolbar">
      <button class="btn btn-success" (click)="openModal()" style="background: #48bb78; border:none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600;">
        <i class="bi bi-plus-lg me-2"></i> Thêm Danh mục Mới
      </button>
    </div>
  </header>

  <!-- Table Container -->
  <div class="admin-table-container position-relative">
    <div *ngIf="isLoading" class="loading-overlay">
      <div class="spinner-border" style="color: #48bb78;" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-dark-custom align-middle mb-0">
        <thead>
          <tr>
            <th>Danh mục & Chi tiết</th>
            <th>Phân loại Parent</th>
            <th>Trạng thái</th>
            <th class="text-end">Hành động</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let cat of categories">
            <td>
              <div class="d-flex align-items-center gap-3">
                <div class="cat-icon">
                  <i class="bi bi-tag-fill"></i>
                </div>
                <div>
                  <div class="cat-name">{{ cat.name }}</div>
                  <div class="cat-desc">{{ cat.description }}</div>
                </div>
              </div>
            </td>
            <td>
              <span *ngIf="cat.parent_id" class="parent-badge">
                <i class="bi bi-arrow-return-right text-success"></i> Child của #{{ cat.parent_id }}
              </span>
              <span *ngIf="!cat.parent_id" class="parent-badge primary">
                <i class="bi bi-diagram-2"></i> Primary Parent
              </span>
            </td>
            <td>
              <span *ngIf="cat.is_active" class="badge bg-success">Hiển thị</span>
              <span *ngIf="!cat.is_active" class="badge bg-danger">Đã ẩn</span>
            </td>
            <td>
              <div class="action-buttons">
                <button (click)="openModal(cat)" class="btn btn-primary-custom btn-sm">
                  <i class="bi bi-pencil-square"></i> Chọn
                </button>
                <button (click)="deleteCategory(cat.category_id)" class="btn btn-danger-custom btn-sm">
                  <i class="bi bi-trash3"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal using Bootstrap structure but custom dark theme -->
  <div class="modal fade" [class.show]="showModal" [style.display]="showModal ? 'block' : 'none'" tabindex="-1" style="background: rgba(0,0,0,0.7);">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content dark-theme">
        <div class="modal-header dark-theme">
          <h5 class="modal-title fw-bold">{{ editingCategory ? 'Chỉnh sửa Danh mục' : 'Thêm Danh mục Mới' }}</h5>
          <button type="button" class="btn-close" (click)="closeModal()"></button>
        </div>
        <div class="modal-body dark-theme">
          <div class="row g-4">
            <div class="col-md-6">
              <label class="form-label dark-theme">Tên Danh Mục</label>
              <input type="text" class="form-control dark-theme" [(ngModel)]="categoryForm.name" placeholder="Ví dụ: Điện thoại">
            </div>
            <div class="col-md-6">
              <label class="form-label dark-theme">Thuộc Danh Mục (Parent)</label>
              <select class="form-select dark-theme" [(ngModel)]="categoryForm.parent_id">
                <option [ngValue]="null">--- Danh Mục Cấp 1 ---</option>
                <option *ngFor="let c of categories" [ngValue]="c.category_id">{{ c.name }}</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label dark-theme">Mô tả</label>
              <textarea class="form-control dark-theme" [(ngModel)]="categoryForm.description" rows="4" placeholder="Nhập mô tả chi tiết..."></textarea>
            </div>
            <div class="col-12">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="isActiveCat" [(ngModel)]="categoryForm.is_active">
                <label class="form-check-label text-white" for="isActiveCat">Hiển thị danh mục này</label>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer dark-theme">
          <button type="button" class="btn btn-outline-custom" (click)="closeModal()">Hủy bỏ</button>
          <button type="button" class="btn text-white px-4 py-2" style="background: #48bb78; border:none; border-radius: 8px; font-weight: 600;" (click)="saveCategory()">
            Lưu Thay Đổi
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
