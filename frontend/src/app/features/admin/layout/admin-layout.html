<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-section">
        <i class="bi bi-shield-lock-fill"></i>
        <h3>AdminPanel</h3>
      </div>
      <p class="subtitle">Trung tâm Quản trị</p>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section" *ngFor="let section of navSections">
        <h4 class="section-title">
          <i [class]="section.icon"></i>
          {{ section.title }}
        </h4>
        <ul class="nav-list">
          <li class="nav-item" *ngFor="let item of section.items">
            <a [routerLink]="item.path" routerLinkActive="active" class="nav-link">
              <i [class]="item.icon"></i>
              <span>{{ item.label }}</span>
            </a>
          </li>
        </ul>
      </div>

      <!-- Khối Logout -->
      <div class="nav-section mt-4">
        <ul class="nav-list">
          <li class="nav-item logout-item">
            <button class="nav-link logout-link" (click)="logout()">
              <i class="bi bi-box-arrow-right"></i>
              <span>Đăng xuất</span>
            </button>
          </li>
        </ul>
      </div>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
