<div class="modal fade" id="loginModal" tabindex="-1" #loginModalElement>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      
      <div class="modal-header text-white" style="background: linear-gradient(90deg, #0d6efd, #0b5ed7);">
        <h5 class="modal-title fw-bold">
            <i class="bi bi-box-arrow-in-right me-2"></i> Đăng nhập
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body p-4">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" formControlName="email" placeholder="example@gmail.com">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" formControlName="password" placeholder="••••••••">
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2" [disabled]="loginForm.invalid || isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
            {{ isLoading ? 'Đang xác thực...' : 'Đăng nhập' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
