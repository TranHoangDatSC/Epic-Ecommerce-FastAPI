<!-- Header -->
<div class="dashboard-header">
  <h5 style="color: #63b3ed; ;">Bảng điều khiển</h5>
  <span>Chào bạn, Người bán!</span>
</div>

<div class="card">
  <h6>Kho hàng của tôi</h6>
<table class="table table-hover align-middle custom-table">
  <thead>
    <tr>
      <th>Ảnh</th>
      <th>Sản phẩm</th>
      <th>Giá</th>
      <th>Số lượng</th>
      <th>Trạng thái</th>
      <th class="text-center">Hành động</th>
    </tr>
  </thead>
   <tbody>
  <tr *ngFor="let cat of pagedCategories">
    <td>
      <img 
        [src]="cat.image || 'https://www.devonhampers.com/image_resize/w555/h555/products/1/single-wall-boxes3.jpg'" 
        class="product-img"
      />
    </td>

    <!-- Sản phẩm -->
    <td>
      <div class="fw-semibold">{{ cat.name }}</div>
      <small class="text-muted">ID: {{ cat.category_id }}</small>
    </td>

    <!-- Giá -->
    <td class="text-primary fw-semibold">
      {{ cat.price || 0 | number }} đ
    </td>

    <!-- Số lượng -->
    <td>
      <span class="quantity-badge">
        {{ cat.quantity || 0 }}
      </span>
    </td>

    <!-- Trạng thái -->
    <td>
      <span 
        class="status-badge"
        [ngClass]="cat.is_active ? 'active' : 'inactive'"
      >
        {{ cat.is_active ? 'Đang bán' : 'Ngừng bán' }}
      </span>
    </td>

    <!-- Hành động -->
    <td>
      <div class="action-buttons">
        <button 
          class="btn btn-dark btn-sm"
          (click)="openModal(cat)"
        >
          <i class="fa-solid fa-pen-to-square"></i>
        </button>

        <button 
          class="btn btn-outline-danger btn-sm"
          (click)="deleteCategory(cat.category_id)"
        >
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>
    </td>
  </tr>
</tbody>
</table>
</div>
