<div class="moderator-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-section">
        <i class="fas fa-shield-alt"></i>
        <h3>Moderator</h3>
      </div>
      <p class="subtitle">Control Center</p>
    </div>

    <nav class="sidebar-nav">
      <!-- KIỂM DUYỆT NỘI DUNG -->
      <div class="nav-section">
        <h4 class="section-title">
          <i class="fas fa-clipboard-check"></i>
          KIỂM DUYỆT NỘI DUNG
        </h4>
        <ul class="nav-list">
          <li class="nav-item">
            <a routerLink="/moderator/dashboard" routerLinkActive="active" class="nav-link">
              <i class="fas fa-tachometer-alt"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="/moderator/product-check" routerLinkActive="active" class="nav-link">
              <i class="fas fa-box"></i>
              <span>Sản phẩm Chờ Duyệt</span>
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="/moderator/rejected-products" routerLinkActive="active" class="nav-link">
              <i class="fas fa-times-circle"></i>
              <span>Sản phẩm Bị Từ Chối</span>
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="/moderator/archived-products" routerLinkActive="active" class="nav-link">
              <i class="fas fa-archive"></i>
              <span>Sản phẩm Lưu Kho</span>
            </a>
          </li>
        </ul>
      </div>

      <!-- AN TOÀN & TIN CẬY -->
      <div class="nav-section">
        <h4 class="section-title">
          <i class="fas fa-lock"></i>
          AN TOÀN & TIN CẬY
        </h4>
        <ul class="nav-list">
          <li class="nav-item">
            <a routerLink="/moderator/violation-report" routerLinkActive="active" class="nav-link">
              <i class="fas fa-exclamation-triangle"></i>
              <span>Báo cáo Vi phạm</span>
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="/moderator/processing-history" routerLinkActive="active" class="nav-link">
              <i class="fas fa-history"></i>
              <span>Lịch sử Xử lý</span>
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="/moderator/seller-appeals" routerLinkActive="active" class="nav-link">
              <i class="fas fa-gavel"></i>
              <span>Khiếu nại từ Người bán</span>
            </a>
          </li>
          <li class="nav-item">
            <a routerLink="/moderator/unlock" routerLinkActive="active" class="nav-link">
              <i class="fas fa-unlock"></i>
              <span>Mở khóa tài khoản</span>
            </a>
          </li>
          <li class="nav-item logout-item">
            <button class="nav-link logout-link" (click)="logout()">
              <i class="fas fa-sign-out-alt"></i>
              <span>Đăng xuất</span>
            </button>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Logout Section -->
    <!-- <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <i class="fas fa-sign-out-alt"></i>
        <span>Đăng xuất</span>
      </button>
    </div> -->
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
