<div *ngIf="!authService.isInitialized()" class="initial-loading">
  <div class="loading-content">
    <div class="spinner"></div>
    <p>Đang đồng bộ hệ thống...</p>
  </div>
</div>

<ng-container *ngIf="authService.isInitialized()">
  <ng-container *ngIf="showShell()">
    <app-header></app-header>
  </ng-container>

  <main [class.fullscreen]="!showShell()">
    <router-outlet></router-outlet>
  </main>

  <ng-container *ngIf="showShell()">
    <app-footer></app-footer>
  </ng-container>
</ng-container>

<!-- Global Notification Modal ... same as before -->
<div class="modal fade" id="globalNotificationModal" tabindex="-1" aria-hidden="true">
  <!-- ... existing modal content ... -->

<!-- Global Notification Modal -->
<div class="modal fade" id="globalNotificationModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
      <div class="modal-body p-4 text-center">
        <div class="mb-4 d-flex justify-content-center">
          <div *ngIf="modalConfig?.type === 'success'" class="icon-circle bg-success-subtle text-success rounded-circle d-flex align-items-center justify-content-center" style="width: 80px; height: 80px; font-size: 40px;">
            <i class="bi bi-check-circle-fill"></i>
          </div>
          <div *ngIf="modalConfig?.type === 'error'" class="icon-circle bg-danger-subtle text-danger rounded-circle d-flex align-items-center justify-content-center" style="width: 80px; height: 80px; font-size: 40px;">
            <i class="bi bi-x-circle-fill"></i>
          </div>
          <div *ngIf="modalConfig?.type === 'warning'" class="icon-circle bg-warning-subtle text-warning rounded-circle d-flex align-items-center justify-content-center" style="width: 80px; height: 80px; font-size: 40px;">
            <i class="bi bi-exclamation-triangle-fill"></i>
          </div>
        </div>
        <h4 class="fw-bold text-dark mb-2">{{ modalConfig?.title }}</h4>
        <p class="text-muted mb-4">{{ modalConfig?.message }}</p>
        <button type="button" class="btn w-100 rounded-pill py-2 fw-bold shadow-sm transition-all hover-lift" 
                [ngClass]="{'btn-success': modalConfig?.type === 'success', 'btn-danger': modalConfig?.type === 'error', 'btn-warning': modalConfig?.type === 'warning'}"
                data-bs-dismiss="modal">
          {{ modalConfig?.confirmText || 'Đã hiểu' }}
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">Login</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password">
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Register Modal -->
<div class="modal fade" id="registerModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">Register</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName">
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email">
              </div>
              <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <input type="text" class="form-control" id="address">
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password">
              </div>
              <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword">
              </div>
              <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input type="tel" class="form-control" id="phone">
              </div>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
      </div>
    </div>
  </div>
</div>
